version: '3.8'

services:
  db:
    image: postgres:14.22-trixie
    container_name: postgres_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      # - postgres_data: /var/lib/postgresql/data
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql
  
